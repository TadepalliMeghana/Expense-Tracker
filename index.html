<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker — SQL in the Browser</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>
<div class="container">
  <header>
    <h1>💰 Expense Tracker</h1>
    <p class="subtitle">SQLite running live in your browser via sql.js — real SQL queries, no server</p>
  </header>

  <form id="transactionForm" class="form-card">
    <input type="date" id="date" required>
    <select id="category" required>
      <option value="Food">Food</option>
      <option value="Transport">Transport</option>
      <option value="Rent">Rent</option>
      <option value="Entertainment">Entertainment</option>
      <option value="Shopping">Shopping</option>
      <option value="Other">Other</option>
    </select>
    <input type="number" id="amount" placeholder="Amount (₹)" step="0.01" min="0" required>
    <input type="text" id="description" placeholder="Description">
    <button type="submit">Add Transaction</button>
  </form>

  <div class="dashboard">
    <div class="card total-card">
      <h3>Total Spend</h3>
      <p class="total-value">₹<span id="totalSpend">0.00</span></p>
    </div>
    <div class="card chart-card">
      <canvas id="summaryChart"></canvas>
    </div>
  </div>

  <div class="table-card">
    <div class="table-header">
      <h3>Transactions</h3>
      <select id="categoryFilter">
        <option value="All">All Categories</option>
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Rent">Rent</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Shopping">Shopping</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <table>
      <thead>
        <tr><th>Date</th><th>Category</th><th>Amount</th><th>Description</th><th></th></tr>
      </thead>
      <tbody id="transactionBody"></tbody>
    </table>
  </div>

  <footer>
    <p>Built with SQLite (via sql.js / WebAssembly) + vanilla JS. <a href="schema.sql">View schema.sql</a></p>
  </footer>
</div>

<script src="app.js"></script>
</body>
</html>
